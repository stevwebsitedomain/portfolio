# Render — portfolio API backend (Brevo only)

services:
  - type: web
    name: portfolio-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/portfolio
    envVars:
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: stevenabalwambo@gmail.com
      - key: SENDER_EMAIL
        value: stevenabalwambo@gmail.com
      - key: SENDER_NAME
        value: Steven Portfolio
      - key: CONTACT_EMAIL
        value: stevenabalwambo@gmail.com
