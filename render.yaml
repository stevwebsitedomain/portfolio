# Render — portfolio API backend (Gmail SMTP)

services:
  - type: web
    name: portfolio-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/portfolio
    envVars:
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SENDER_EMAIL
        value: developer.company2026@gmail.com
      - key: SENDER_NAME
        value: Steven Portfolio
      - key: CONTACT_EMAIL
        value: developer.company2026@gmail.com
      - key: SMTP_USER
        value: developer.company2026@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
