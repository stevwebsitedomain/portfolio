# Render Blueprint — Yii2 backend API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: portfolio-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/portfolio
    envVars:
      - key: YII_ENV
        value: prod
      - key: YII_DEBUG
        value: "0"
